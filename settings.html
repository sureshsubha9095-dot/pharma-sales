<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - PharmaAnalytics</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-pills"></i>
                <h1>PharmaAnalytics</h1>
            </div>
            <nav>
                <a href="/"><i class="fas fa-chart-bar"></i> Dashboard</a>
                <a href="/reports"><i class="fas fa-file-alt"></i> Reports</a>
                <a href="/settings" class="active"><i class="fas fa-cog"></i> Settings</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="hero">
            <h2>System Settings & Configuration</h2>
            <p>Customize your dashboard preferences and system settings</p>
        </div>

        <div class="settings-container">
            <div class="settings-section">
                <h3><i class="fas fa-palette"></i> Appearance</h3>
                <div class="setting-item">
                    <label for="theme">Theme</label>
                    <select id="theme">
                        <option value="light">Light</option>
                        <option value="dark" selected>Dark</option>
                        <option value="auto">Auto</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="animations">Enable Animations</label>
                    <input type="checkbox" id="animations" checked>
                </div>
                <div class="setting-item">
                    <label for="compact">Compact Mode</label>
                    <input type="checkbox" id="compact">
                </div>
            </div>

            <div class="settings-section">
                <h3><i class="fas fa-chart-bar"></i> Dashboard</h3>
                <div class="setting-item">
                    <label for="refreshRate">Auto Refresh Rate</label>
                    <select id="refreshRate">
                        <option value="off">Off</option>
                        <option value="30">30 seconds</option>
                        <option value="60" selected>1 minute</option>
                        <option value="300">5 minutes</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="defaultView">Default View</label>
                    <select id="defaultView">
                        <option value="dashboard" selected>Dashboard</option>
                        <option value="reports">Reports</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="currency">Currency Display</label>
                    <select id="currency">
                        <option value="USD" selected>USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h3><i class="fas fa-bell"></i> Notifications</h3>
                <div class="setting-item">
                    <label for="emailAlerts">Email Alerts</label>
                    <input type="checkbox" id="emailAlerts">
                </div>
                <div class="setting-item">
                    <label for="salesAlerts">Sales Threshold Alerts</label>
                    <input type="checkbox" id="salesAlerts" checked>
                </div>
                <div class="setting-item">
                    <label for="threshold">Alert Threshold ($)</label>
                    <input type="number" id="threshold" value="1000" min="100">
                </div>
            </div>

            <div class="settings-section">
                <h3><i class="fas fa-database"></i> Data Management</h3>
                <div class="setting-item">
                    <label for="dataRetention">Data Retention (days)</label>
                    <select id="dataRetention">
                        <option value="30">30 days</option>
                        <option value="90" selected>90 days</option>
                        <option value="365">1 year</option>
                        <option value="unlimited">Unlimited</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="autoBackup">Auto Backup</label>
                    <input type="checkbox" id="autoBackup" checked>
                </div>
                <div class="setting-item">
                    <button class="btn-secondary" id="exportData">Export Data</button>
                    <button class="btn-secondary" id="importData">Import Data</button>
                </div>
            </div>

            <div class="settings-section">
                <h3><i class="fas fa-user"></i> Account</h3>
                <div class="setting-item">
                    <label for="username">Username</label>
                    <input type="text" id="username" value="admin" readonly>
                </div>
                <div class="setting-item">
                    <label for="email">Email</label>
                    <input type="email" id="email" value="admin@pharmaanalytics.com">
                </div>
                <div class="setting-item">
                    <button class="btn-primary" id="changePassword">Change Password</button>
                </div>
            </div>

            <div class="settings-actions">
                <button class="btn-primary" id="saveSettings">Save Settings</button>
                <button class="btn-secondary" id="resetSettings">Reset to Defaults</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 PharmaAnalytics. All rights reserved.</p>
    </footer>

    <script src="/static/settings.js"></script>
</body>
</html>
